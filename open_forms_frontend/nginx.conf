# vite.config.ts 의 개발 프록시와 같은 역할을 배포 환경에서 수행합니다.
# 브라우저 입장에서는 이 nginx 한 곳만 호출하는 동일 출처가 되므로, 백엔드에 CORS
# 설정이 없어도 됩니다(설계 의도 그대로 유지).

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 업스트림 머신이 재생성되면 6PN 주소가 바뀝니다. nginx 는 기동 시 한 번만 이름을
    # 풀기 때문에, Fly 내부 DNS 를 resolver 로 지정하고 proxy_pass 에 변수를 써서
    # 요청 시점마다 다시 풀도록 합니다.
    resolver [fdaa::3]:53 valid=10s ipv6=on;

    client_max_body_size 2m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # /api  — 애플리케이션 호출
    # /swagger-ui, /v3/api-docs — 평가자가 API 문서를 바로 열어볼 수 있도록 함께 노출
    location ~ ^/(api/|swagger-ui|v3/api-docs) {
        set $upstream open-forms-api.internal:8080;
        proxy_pass http://$upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Neon 이 콜드 스타트 중이면 첫 쿼리가 느릴 수 있어 넉넉히 잡습니다.
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Vite 가 파일명에 해시를 넣으므로 영구 캐시가 안전합니다.
    # `expires` 지시자는 쓰지 않습니다 — add_header 와 함께 두면 Cache-Control 이 두 번
    # 나갑니다(중복 헤더). 한 줄로 직접 지정합니다.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA — /forms/:id 같은 클라이언트 라우트를 index.html 로 되돌립니다.
    # index.html 자체는 절대 캐시하지 않아야 배포 직후 옛 번들을 가리키지 않습니다.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
