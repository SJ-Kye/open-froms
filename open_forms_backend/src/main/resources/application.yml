spring:
  application:
    name: open-forms-backend

  # 프로젝트 루트의 .env 를 설정으로 읽어 들입니다(없으면 무시 → 아래 기본값 사용).
  # bootRun 은 open_forms_backend/ 에서, 부트 JAR 은 루트에서 실행될 수 있어 두 경로를 모두 지정합니다.
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/open_forms}
    username: ${SPRING_DATASOURCE_USERNAME:open_forms}
    password: ${SPRING_DATASOURCE_PASSWORD:open_forms}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway가 스키마의 단일 진실 원천 → 검증만 수행
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# 인증 토큰 설정
app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  # 리프레시 토큰은 JWT 가 아니라 DB 에 상태로 존재하는 불투명 난수라 설정을 분리합니다.
  # 액세스 토큰(1시간)이 만료되어도 이 기간 동안은 재로그인 없이 갱신할 수 있습니다.
  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:14}

# Swagger UI: /swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
  # 모든 로그 라인에 요청별 traceId 를 노출합니다(TraceIdFilter 가 MDC 에 세팅). 없으면 빈 값.
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
