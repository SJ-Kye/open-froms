# 테스트 프로파일: H2 in-memory (PostgreSQL 호환 모드) — Docker 없이 실행 가능
# 운영과 동일한 Flyway 스크립트를 실행하여 스키마 정합 유지
spring:
  datasource:
    url: jdbc:h2:mem:openforms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long-000
    expiration-seconds: 3600
  refresh-token:
    expiration-days: 14
