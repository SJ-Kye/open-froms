# 백엔드 API — 공개 IP 를 할당하지 않아 인터넷에서 직접 닿지 않습니다.
# 프론트엔드(nginx) 앱만 Fly 사설망(6PN)의 open-forms-api.internal:8080 으로 접근합니다.
# 배포: 리포지터리 루트에서 `fly deploy --config open_forms_backend/fly.toml`

app = "open-forms-api"
primary_region = "nrt"

[build]
  dockerfile = "open_forms_backend/Dockerfile"

[env]
  # Fly 사설망은 IPv6 전용입니다. Tomcat 기본 바인드로는 6PN 요청을 받지 못할 수 있어
  # IPv6 와일드카드로 명시합니다(리눅스 듀얼스택이라 IPv4 도 함께 수신).
  SERVER_ADDRESS = "::"
  SERVER_PORT = "8080"

# [http_service] 를 두지 않습니다 = 공개 엔드포인트 없음.
# 그 대신 사설망 안에서만 열립니다. `fly ips list -a open-forms-api` 가 비어 있어야 정상입니다.

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
